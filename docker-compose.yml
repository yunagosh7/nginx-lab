services:
  nginx:
    image: nginx:1.29.4-alpine
    container_name: nginx-lab
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    networks:
      - lab-network
    depends_on:
      - app-node
      - app-python

  app-node:
    build: ./app-node
    volumes:
      - ./app-node:/app
      - /app/node_modules
    deploy:
      replicas: 3
    networks:
      - lab-network
    env_file:
      - ./app-node/.env
    depends_on:
      rabbitmq:
        condition: service_healthy
    command: sh -c "npm install && npm run dev"

  app-python:
    build: ./app-python
    volumes:
      - ./app-python:/app
    networks:
      - lab-network
    environment:
      RABBITMQ_URL: amqp://guest:guest@rabbitmq/
    depends_on:
      rabbitmq:
        condition: service_healthy

  rabbitmq:
    image: rabbitmq:3-management-alpine
    container_name: rabbitmq-lab
    ports:
      - "15672:15672"
    networks:
      - lab-network
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  db-mysql:
    image: mysql:8.0
    labels:
      - "description=MySQL database for the node app"
    volumes:
      - mysql_data:/var/lib/mysql
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE}
    networks:
      - lab-network

  db-postgres:
    image: postgres:14
    labels:
      - "description=Postgres database for the python app"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    environment:
      POSTGRES_USER: root
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: python_app
    networks:
      - lab-network

volumes:
  mysql_data:
  postgres_data:

networks:
  lab-network:
